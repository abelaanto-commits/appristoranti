<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#060a10">
<title>PulseTable</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060a10;
  --bg2:#0b1018;
  --surface:#0f1520;
  --surface2:#141c28;
  --surface3:#1a2235;
  --glass:rgba(255,255,255,.045);
  --glass2:rgba(255,255,255,.075);
  --border:rgba(255,255,255,.07);
  --border2:rgba(255,255,255,.13);
  --text:#edeae3;
  --text2:#a8a29a;
  --text3:#5c6270;
  --gold:#d4a843;
  --gold-l:#f0c86a;
  --gold-dim:rgba(212,168,67,.16);
  --teal:#28c5b4;
  --teal-dim:rgba(40,197,180,.14);
  --green:#48cc88;
  --green-dim:rgba(72,204,136,.14);
  --red:#e05555;
  --red-dim:rgba(224,85,85,.13);
  --violet:#9a82ff;
  --violet-dim:rgba(154,130,255,.14);
  --r:18px;
  --r-sm:12px;
  --nav-h:76px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;
  padding-bottom:calc(var(--nav-h) + var(--safe-bottom));
  overflow-x:hidden;
}

/* Grain */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity:.03;
}
/* Blobs */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 70% 40% at 50% 0%, rgba(212,168,67,.08) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 85% 70%, rgba(40,197,180,.06) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 10% 80%, rgba(154,130,255,.05) 0%, transparent 60%);
}

/* ── HEADER ─────────────────────────────── */
.header{
  position:sticky;top:0;z-index:90;
  background:rgba(6,10,16,.88);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  padding:env(safe-area-inset-top,0px) 18px 0;
}
.header-inner{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 0;
}
.logo{
  font-family:'Syne',sans-serif;
  font-size:1.18rem;font-weight:800;
  letter-spacing:-.01em;
  display:flex;align-items:center;gap:10px;
}
.logo-dot{
  width:10px;height:10px;border-radius:50%;
  background:var(--gold);
  box-shadow:0 0 10px rgba(212,168,67,.6);
}
.header-sync{
  display:flex;align-items:center;gap:6px;
  padding:8px 14px;border-radius:999px;
  background:var(--glass);border:1px solid var(--border);
  font-size:.78rem;color:var(--text2);
  cursor:pointer;transition:all .2s;
  font-family:'DM Sans',sans-serif;
  font-weight:500;
}
.header-sync:hover{border-color:var(--teal);color:var(--teal)}
.hdot{
  width:6px;height:6px;border-radius:50%;
  background:var(--green);
  box-shadow:0 0 5px var(--green);
  animation:hdotpulse 2s ease-in-out infinite;
}
@keyframes hdotpulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── STATS BAND ─────────────────────────── */
.stats-band{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:0;
  border-bottom:1px solid var(--border);
  position:relative;z-index:1;
}
.stat-cell{
  padding:16px 12px;text-align:center;
  border-right:1px solid var(--border);
}
.stat-cell:last-child{border-right:none}
.stat-num{
  font-family:'Syne',sans-serif;
  font-size:1.6rem;font-weight:800;line-height:1;
  color:var(--text);
}
.stat-num.s-new{color:var(--gold-l)}
.stat-num.s-conf{color:var(--green)}
.stat-label{font-size:.65rem;color:var(--text3);margin-top:3px;text-transform:uppercase;letter-spacing:.07em}

/* ── TABS (bottom nav) ──────────────────── */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:rgba(6,10,16,.92);
  backdrop-filter:blur(24px);
  border-top:1px solid var(--border);
  display:flex;
  padding-bottom:var(--safe-bottom);
}
.tab{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;padding:10px 0;
  cursor:pointer;transition:color .2s;
  font-size:.65rem;font-weight:600;
  text-transform:uppercase;letter-spacing:.08em;
  color:var(--text3);border:none;background:none;
  font-family:'DM Sans',sans-serif;
}
.tab svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.tab.active{color:var(--gold)}
.tab.active svg{filter:drop-shadow(0 0 4px rgba(212,168,67,.5))}

/* ── PAGES ──────────────────────────────── */
.page{display:none;padding:16px 16px 0;position:relative;z-index:1}
.page.active{display:block;animation:pgIn .25s ease both}
@keyframes pgIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* ── PAGE HEADER ────────────────────────── */
.page-title{
  font-family:'Syne',sans-serif;
  font-size:1.5rem;font-weight:800;
  margin-bottom:16px;line-height:1.1;
}
.page-title span{color:var(--gold)}

/* ── FILTER ROW ─────────────────────────── */
.filter-row{
  display:flex;gap:8px;overflow-x:auto;padding-bottom:12px;
  scrollbar-width:none;margin-bottom:12px;
}
.filter-row::-webkit-scrollbar{display:none}
.f-chip{
  flex-shrink:0;padding:8px 16px;border-radius:999px;
  border:1px solid var(--border);background:var(--glass);
  font-size:.78rem;font-weight:600;color:var(--text2);
  cursor:pointer;transition:all .18s;
  font-family:'DM Sans',sans-serif;white-space:nowrap;
}
.f-chip.active{background:var(--gold-dim);border-color:rgba(212,168,67,.35);color:var(--gold-l)}

/* ── BOOKING CARDS ──────────────────────── */
.cards{display:grid;gap:12px;padding-bottom:20px}
.bcard{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  overflow:hidden;
  transition:border-color .2s;
  position:relative;
  animation:cardIn .3s ease both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.bcard:active{transform:scale(.99)}
.bcard-accent{height:3px;width:100%}
.bcard.nuova .bcard-accent{background:linear-gradient(90deg,var(--gold),var(--gold-l))}
.bcard.confermata .bcard-accent{background:linear-gradient(90deg,var(--green),#7ef2ba)}
.bcard.completata .bcard-accent{background:linear-gradient(90deg,var(--violet),#c4b5ff)}
.bcard.annullata .bcard-accent{background:var(--surface3)}
.bcard.annullata{opacity:.55}
.bcard-body{padding:14px 16px}
.bcard-row1{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px}
.bcard-name{
  font-family:'Syne',sans-serif;
  font-size:1rem;font-weight:700;line-height:1.2;
}
.badge{
  flex-shrink:0;
  padding:4px 10px;border-radius:999px;
  font-size:.7rem;font-weight:700;
  white-space:nowrap;
}
.b-nuova{
  background:rgba(212,168,67,.15);color:var(--gold-l);
  display:flex;align-items:center;gap:5px;
}
.b-nuova::before{
  content:'';width:5px;height:5px;border-radius:50%;
  background:var(--gold-l);
  animation:badgep 1.8s ease-in-out infinite;
}
@keyframes badgep{0%,100%{opacity:1}50%{opacity:.3}}
.b-confermata{background:var(--green-dim);color:var(--green)}
.b-completata{background:var(--violet-dim);color:var(--violet)}
.b-annullata{background:var(--red-dim);color:var(--red)}
.bcard-rest{
  font-size:.75rem;color:var(--text3);
  margin-bottom:10px;
  display:flex;align-items:center;gap:6px;
}
.bcard-rest::before{
  content:'';width:4px;height:4px;border-radius:50%;
  background:var(--gold-dim);
  flex-shrink:0;
}
.bcard-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.info-pill{
  padding:9px 11px;border-radius:10px;
  background:rgba(255,255,255,.025);
  border:1px solid rgba(255,255,255,.04);
}
.info-label{font-size:.62rem;text-transform:uppercase;letter-spacing:.09em;color:var(--text3);margin-bottom:2px}
.info-val{font-size:.86rem;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bcard-note{
  padding:9px 11px;border-radius:10px;
  background:rgba(255,255,255,.025);
  border:1px solid rgba(255,255,255,.04);
  font-size:.82rem;color:var(--text2);line-height:1.5;
  margin-bottom:10px;
}
.bcard-note .info-label{margin-bottom:3px}
.bcard-actions{display:flex;gap:8px;flex-wrap:wrap}
.act{
  flex:1;min-width:0;
  padding:10px 8px;border-radius:10px;
  font-family:'DM Sans',sans-serif;
  font-size:.78rem;font-weight:700;
  border:none;cursor:pointer;
  transition:all .15s;text-align:center;
  letter-spacing:.02em;
}
.act:active{transform:scale(.97)}
.act-conf{background:var(--green-dim);border:1px solid rgba(72,204,136,.2);color:var(--green)}
.act-comp{background:var(--violet-dim);border:1px solid rgba(154,130,255,.2);color:var(--violet)}
.act-canc{background:var(--red-dim);border:1px solid rgba(224,85,85,.2);color:var(--red)}
.act-reop{background:var(--gold-dim);border:1px solid rgba(212,168,67,.2);color:var(--gold-l)}

.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-icon{font-size:2.5rem;margin-bottom:14px;opacity:.35}
.empty p{font-size:.9rem;line-height:1.6}

/* ── FORM PAGE ──────────────────────────── */
.form-section{margin-bottom:20px}
.form-label{
  font-size:.72rem;font-weight:600;
  text-transform:uppercase;letter-spacing:.1em;
  color:var(--text3);margin-bottom:7px;display:block;
}
.form-control{
  width:100%;font-family:'DM Sans',sans-serif;font-size:.93rem;
  color:var(--text);background:var(--surface2);
  border:1px solid var(--border);border-radius:var(--r-sm);
  padding:13px 14px;outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.form-control:focus{border-color:rgba(212,168,67,.5);box-shadow:0 0 0 3px rgba(212,168,67,.08)}
.form-control::placeholder{color:var(--text3)}
.form-control option{background:var(--surface)}
textarea.form-control{resize:vertical;min-height:90px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn-submit{
  width:100%;padding:15px;border-radius:var(--r);
  background:linear-gradient(135deg,var(--gold),var(--gold-l));
  color:var(--bg);font-family:'Syne',sans-serif;
  font-size:1rem;font-weight:800;border:none;cursor:pointer;
  box-shadow:0 6px 24px rgba(212,168,67,.3);
  transition:all .2s;letter-spacing:.01em;
  margin-top:8px;
}
.btn-submit:active{transform:scale(.98);box-shadow:0 2px 12px rgba(212,168,67,.2)}

/* ── SETTINGS PAGE ──────────────────────── */
.settings-section{margin-bottom:24px}
.settings-title{
  font-family:'Syne',sans-serif;
  font-size:.85rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.1em;
  color:var(--text3);margin-bottom:12px;
}
.settings-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:18px;
}
.settings-card + .settings-card{margin-top:10px}
.status-banner{
  padding:12px 14px;border-radius:var(--r-sm);
  font-size:.84rem;font-weight:500;line-height:1.4;
  display:flex;align-items:center;gap:8px;
  margin-top:12px;
}
.status-banner.ok{background:var(--green-dim);border:1px solid rgba(72,204,136,.2);color:#9af0c4}
.status-banner.err{background:var(--red-dim);border:1px solid rgba(224,85,85,.2);color:#f0b0b0}
.status-banner.idle{background:var(--glass);border:1px solid var(--border);color:var(--text3)}
.sync-meta{font-size:.76rem;color:var(--text3);line-height:1.6;margin-top:8px}
.btn-settings{
  width:100%;margin-top:10px;padding:12px;
  font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:700;
  border-radius:var(--r-sm);border:1px solid var(--border);
  background:var(--glass);color:var(--text);
  cursor:pointer;transition:all .2s;letter-spacing:.02em;
}
.btn-settings:active{background:var(--glass2)}
.btn-teal-s{border-color:rgba(40,197,180,.2);background:var(--teal-dim);color:var(--teal)}
.btn-danger{border-color:rgba(224,85,85,.2);background:var(--red-dim);color:var(--red)}
.sync-info-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 0;border-bottom:1px solid var(--border);font-size:.84rem;
}
.sync-info-row:last-child{border-bottom:none}
.sync-info-val{color:var(--text2);font-weight:500}

/* ── TOAST ──────────────────────────────── */
#toast{
  position:fixed;top:calc(env(safe-area-inset-top,0px) + 80px);
  left:50%;transform:translateX(-50%) translateY(-10px);
  z-index:9999;width:calc(100% - 32px);max-width:380px;
  padding:13px 16px;border-radius:14px;
  font-size:.86rem;font-weight:600;text-align:center;
  box-shadow:0 8px 28px rgba(0,0,0,.5);
  opacity:0;pointer-events:none;
  transition:all .3s cubic-bezier(.34,1.56,.64,1);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{background:var(--surface3);border:1px solid rgba(72,204,136,.3);color:#b0f5d0}
#toast.err{background:var(--surface3);border:1px solid rgba(224,85,85,.3);color:#f5b5b5}

/* ── SCROLLBAR ──────────────────────────── */
::-webkit-scrollbar{display:none}
*{scrollbar-width:none}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo">
      <span class="logo-dot"></span>
      PulseTable
    </div>
    <button class="header-sync" id="quickSyncBtn">
      <span class="hdot" id="hdot"></span>
      Sync
    </button>
  </div>

  <div class="stats-band">
    <div class="stat-cell">
      <div class="stat-num" id="statTotal">0</div>
      <div class="stat-label">Totale</div>
    </div>
    <div class="stat-cell">
      <div class="stat-num s-new" id="statNew">0</div>
      <div class="stat-label">Nuove</div>
    </div>
    <div class="stat-cell">
      <div class="stat-num s-conf" id="statConf">0</div>
      <div class="stat-label">Conf.</div>
    </div>
    <div class="stat-cell">
      <div class="stat-num" id="statGuests">0</div>
      <div class="stat-label">Coperti</div>
    </div>
  </div>
</header>

<!-- ── PAGE: PRENOTAZIONI ───────────────── -->
<div class="page active" id="pgList">
  <div style="margin-bottom:4px">
    <div class="page-title">Prenotazioni <span>live</span></div>
  </div>

  <div class="filter-row" id="filterRow">
    <button class="f-chip active" data-filter="">Tutte</button>
    <button class="f-chip" data-filter="Nuova">Nuove</button>
    <button class="f-chip" data-filter="Confermata">Confermate</button>
    <button class="f-chip" data-filter="Completata">Completate</button>
    <button class="f-chip" data-filter="Annullata">Annullate</button>
  </div>

  <div id="cardsList" class="cards"></div>
  <div id="emptyState" class="empty" style="display:none">
    <div class="empty-icon">📋</div>
    <p>Nessuna prenotazione trovata</p>
  </div>
</div>

<!-- ── PAGE: NUOVA ──────────────────────── -->
<div class="page" id="pgNew">
  <div class="page-title">Nuova <span>prenotazione</span></div>
  <div class="form-section">
    <label class="form-label">Ristorante</label>
    <select id="restaurant" class="form-control"></select>
  </div>
  <div class="form-section">
    <label class="form-label">Tipo richiesta</label>
    <select id="bookingType" class="form-control">
      <option>Prenotazione</option>
      <option>Appuntamento</option>
    </select>
  </div>
  <div class="form-section">
    <label class="form-label">Nome cliente</label>
    <input id="customerName" type="text" class="form-control" placeholder="Mario Rossi">
  </div>
  <div class="form-row">
    <div class="form-section">
      <label class="form-label">Telefono</label>
      <input id="phone" type="tel" class="form-control" placeholder="333 123 4567">
    </div>
    <div class="form-section">
      <label class="form-label">Persone</label>
      <input id="guests" type="number" min="1" max="30" value="2" class="form-control">
    </div>
  </div>
  <div class="form-section">
    <label class="form-label">Email</label>
    <input id="email" type="email" class="form-control" placeholder="cliente@email.com">
  </div>
  <div class="form-row">
    <div class="form-section">
      <label class="form-label">Data</label>
      <input id="bookingDate" type="date" class="form-control">
    </div>
    <div class="form-section">
      <label class="form-label">Orario</label>
      <select id="bookingTime" class="form-control"></select>
    </div>
  </div>
  <div class="form-section">
    <label class="form-label">Note</label>
    <textarea id="notes" class="form-control" placeholder="Allergie, richieste speciali…"></textarea>
  </div>
  <button class="btn-submit" id="saveBtn">Salva prenotazione</button>
  <div style="height:20px"></div>
</div>

<!-- ── PAGE: IMPOSTAZIONI ───────────────── -->
<div class="page" id="pgSettings">
  <div class="page-title">Impostazioni <span>&amp;</span> Sync</div>

  <div class="settings-section">
    <div class="settings-title">Ponte online</div>
    <div class="settings-card">
      <label class="form-label">Bridge URL</label>
      <input id="bridgeUrl" type="text" class="form-control" placeholder="https://script.google.com/...">
      <div style="height:10px"></div>
      <label class="form-label">Chiave segreta</label>
      <input id="bridgeKey" type="text" class="form-control" placeholder="chiave-ponte">
      <button class="btn-settings" id="saveBridgeBtn">Salva impostazioni</button>
      <button class="btn-settings btn-teal-s" id="syncNowBtn">Sincronizza adesso</button>
      <div id="statusBanner" class="status-banner idle">In attesa…</div>
      <div id="syncMeta" class="sync-meta"></div>
    </div>
  </div>

  <div class="settings-section">
    <div class="settings-title">Info sincronizzazione</div>
    <div class="settings-card">
      <div class="sync-info-row">
        <span>Auto-sync</span>
        <span class="sync-info-val">ogni 60 secondi</span>
      </div>
      <div class="sync-info-row">
        <span>Dispositivi</span>
        <span class="sync-info-val">Tutti i soci condivisi</span>
      </div>
      <div class="sync-info-row">
        <span>Conferma email</span>
        <span class="sync-info-val">Inviata al cliente</span>
      </div>
    </div>
  </div>

  <div class="settings-section">
    <div class="settings-title">Gestione dati</div>
    <div class="settings-card">
      <button class="btn-settings" id="exportBtn">Esporta CSV</button>
      <button class="btn-settings" id="backupBtn">Backup JSON</button>
      <button class="btn-settings btn-danger" id="resetBtn">Azzera tutti i dati</button>
    </div>
  </div>
  <div style="height:20px"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="tab active" data-tab="pgList">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    Lista
  </button>
  <button class="tab" data-tab="pgNew">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    Nuova
  </button>
  <button class="tab" data-tab="pgSettings">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    Sync
  </button>
</nav>

<div id="toast"></div>

<script>
const STORAGE_KEY = 'pulsetable_mobile_v3';
const AUTO_SYNC_MS = 60000;
const DEFAULTS = ['Sorelle a Mare','A·Pollo','Da Carmelo'];
const TIME_SLOTS = ['12:00','12:30','13:00','13:30','14:00','19:00','19:30','20:00','20:30','21:00','21:30','22:00'];
const $ = id => document.getElementById(id);

let app = {
  restaurants:[...DEFAULTS],
  reservations:[],
  archivedReservations:[],
  bridge:{ url:'https://script.google.com/macros/s/AKfycbx3OAR1oHYP81_CSF4pdfXRdUK0RgHlBU_NZ3hPt7-ziiFBkw2geMgVHJwXmRpqMf-F_Q/exec', key:'sorelleponte2025' },
  archivedBridgeIds:[],
  resetBefore:null
};

let autoTimer = null;
let lastSyncLabel = 'mai';
let isSyncing = false;
let activeFilter = '';
let __confirmId = null;

// ── STORAGE ──────────────────────────────
function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(app)) }

function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return;
    const p = JSON.parse(raw);
    if(Array.isArray(p.restaurants)) app.restaurants=Array.from(new Set([...DEFAULTS,...p.restaurants]));
    if(Array.isArray(p.reservations)) app.reservations=p.reservations;
    if(Array.isArray(p.archivedReservations)) app.archivedReservations=p.archivedReservations;
    if(p.bridge) app.bridge={...app.bridge,...p.bridge};
    if(Array.isArray(p.archivedBridgeIds)) app.archivedBridgeIds=p.archivedBridgeIds;
    if(p.resetBefore) app.resetBefore=p.resetBefore;
  }catch(e){console.error(e)}
}

// ── TOAST ─────────────────────────────────
let toastT = null;
function toast(msg, ok=true){
  const el=$('toast');
  el.textContent=msg;
  el.className='show '+(ok?'ok':'err');
  clearTimeout(toastT);
  toastT=setTimeout(()=>{el.className=(ok?'ok':'err')},3500);
}

// ── STATUS BANNER ─────────────────────────
function setStatus(msg, ok, idle=false){
  const el=$('statusBanner');
  el.textContent=msg;
  el.className='status-banner '+(idle?'idle':ok?'ok':'err');
}

function refreshSyncMeta(){
  $('syncMeta').textContent=`Auto-sync ogni 60s · Ultimo: ${lastSyncLabel}`;
}

// ── FILL SELECTORS ────────────────────────
function fillSelectors(){
  $('restaurant').innerHTML=app.restaurants.map(r=>`<option>${r}</option>`).join('');
  $('bookingTime').innerHTML=TIME_SLOTS.map(t=>`<option>${t}</option>`).join('');
  $('bookingDate').value=new Date().toISOString().split('T')[0];
  $('bridgeUrl').value=app.bridge.url||'';
  $('bridgeKey').value=app.bridge.key||'';
}

// ── STATS ─────────────────────────────────
function renderStats(){
  const r=app.reservations;
  $('statTotal').textContent=r.length;
  $('statNew').textContent=r.filter(x=>x.status==='Nuova').length;
  $('statConf').textContent=r.filter(x=>x.status==='Confermata').length;
  $('statGuests').textContent=r.reduce((s,x)=>s+Number(x.guests||0),0);
}

// ── RENDER CARDS ──────────────────────────
function badgeCls(s){
  const m={Nuova:'b-nuova',Confermata:'b-confermata',Completata:'b-completata',Annullata:'b-annullata'};
  return m[s]||'b-nuova';
}

function renderReservations(){
  renderStats();
  const items = activeFilter
    ? app.reservations.filter(r=>r.status===activeFilter)
    : app.reservations;
  const wrap=$('cardsList');
  wrap.innerHTML='';
  $('emptyState').style.display=items.length?'none':'block';
  items.forEach(item=>{
    const div=document.createElement('article');
    div.className=`bcard ${(item.status||'nuova').toLowerCase()}`;
    div.innerHTML=`
      <div class="bcard-accent"></div>
      <div class="bcard-body">
        <div class="bcard-row1">
          <div class="bcard-name">${item.customerName||'Cliente senza nome'}</div>
          <span class="badge ${badgeCls(item.status)}">${item.status}</span>
        </div>
        <div class="bcard-rest">${item.restaurant} · ${item.bookingType||'Prenotazione'}</div>
        <div class="bcard-grid">
          <div class="info-pill"><div class="info-label">Data</div><div class="info-val">${item.bookingDate||'—'}</div></div>
          <div class="info-pill"><div class="info-label">Ore</div><div class="info-val">${item.bookingTime||'—'}</div></div>
          <div class="info-pill"><div class="info-label">Persone</div><div class="info-val">${item.guests||'—'}</div></div>
          <div class="info-pill"><div class="info-label">Tel</div><div class="info-val">${item.phone||'—'}</div></div>
        </div>
        ${item.notes?`<div class="bcard-note"><div class="info-label">Note</div>${item.notes}</div>`:''}
        <div class="bcard-actions">
          ${item.status==='Nuova'?`<button class="act act-conf" data-id="${item.id}" data-action="confirm">✓ Conferma</button>`:''}
          ${item.status==='Nuova'||item.status==='Confermata'?`<button class="act act-comp" data-id="${item.id}" data-action="complete">Completa</button>`:''}
          ${item.status!=='Annullata'?`<button class="act act-canc" data-id="${item.id}" data-action="cancel">Annulla</button>`:''}
          ${item.status==='Annullata'?`<button class="act act-reop" data-id="${item.id}" data-action="reopen">Riapri</button>`:''}
        </div>
      </div>`;
    wrap.appendChild(div);
  });

  wrap.querySelectorAll('[data-action]').forEach(btn=>{
    btn.onclick=()=>{
      const id=btn.dataset.id;
      const action=btn.dataset.action;
      const item=app.reservations.find(r=>String(r.id)===String(id));
      if(!item) return;
      if(action==='confirm' && item.bridgeId){
        startConfirmBridge(item);
      } else if(action==='confirm'){
        updateStatus(item,'Confermata');
        toast('✓ Prenotazione confermata');
      } else if(action==='complete'){
        updateStatus(item,'Completata');
        toast('Prenotazione completata');
      } else if(action==='cancel'){
        updateStatus(item,'Annullata');
        toast('Prenotazione annullata');
      } else if(action==='reopen'){
        updateStatus(item,'Nuova');
        toast('Prenotazione riaperta');
      }
    };
  });
}

// ── STATUS UPDATE (senza rimuovere dal lista) ─
// FIX #2: la card rimane, cambia solo il badge e il colore
function updateStatus(item, newStatus){
  const idx=app.reservations.findIndex(r=>String(r.id)===String(item.id));
  if(idx===-1) return;
  app.reservations[idx].status=newStatus;
  save();
  renderReservations();
}

// ── RESET ─────────────────────────────────
function resetAll(){
  if(!confirm('Vuoi davvero azzerare tutte le prenotazioni?')) return;
  const ids=app.reservations.map(r=>r.bridgeId).filter(Boolean);
  app.archivedBridgeIds=Array.from(new Set([...(app.archivedBridgeIds||[]),...ids]));
  app.archivedReservations=[
    ...app.reservations.map(r=>({...r,archivedAt:new Date().toISOString()})),
    ...app.archivedReservations
  ];
  app.resetBefore=new Date().toISOString();
  app.reservations=[];
  save();
  renderReservations();
  toast('Dati azzerati');
  setStatus('Dati azzerati',true);
}

// ── ADD RESERVATION ───────────────────────
function addReservation(){
  const name=$('customerName').value.trim();
  const phone=$('phone').value.trim();
  if(!name||!phone){ toast('Nome e telefono obbligatori',false); return; }
  app.reservations.unshift({
    id:Date.now(),bridgeId:null,
    restaurant:$('restaurant').value,
    bookingType:$('bookingType').value,
    customerName:name,phone,
    email:$('email').value.trim(),
    guests:Number($('guests').value||0),
    bookingDate:$('bookingDate').value,
    bookingTime:$('bookingTime').value,
    notes:$('notes').value.trim(),
    status:'Nuova',
    createdAt:new Date().toISOString(),
    source:'mobile-app'
  });
  save();
  renderReservations();
  $('customerName').value='';$('phone').value='';$('email').value='';$('notes').value='';
  $('guests').value=2;
  toast('✓ Prenotazione salvata');
  // Torna alla lista
  switchPage('pgList');
}

// ── BRIDGE SYNC ───────────────────────────
function saveBridge(){
  app.bridge.url=$('bridgeUrl').value.trim();
  app.bridge.key=$('bridgeKey').value.trim();
  save();
  toast('Impostazioni salvate');
  setStatus('Impostazioni salvate',true);
  startAutoSync();
}

function syncNow(auto=false){
  const url=$('bridgeUrl').value.trim();
  const key=$('bridgeKey').value.trim();
  if(!url||!key){ setStatus('Configura URL e chiave',false); return; }
  if(isSyncing) return;
  isSyncing=true;
  $('hdot').style.animation='none';
  setStatus(auto?'Sync automatico…':'Sincronizzazione…',true,true);
  const s=document.createElement('script');
  s.src=`${url}${url.includes('?')?'&':'?'}action=list&key=${encodeURIComponent(key)}&callback=__ptSync&_=${Date.now()}`;
  s.onerror=()=>{ isSyncing=false; $('hdot').style.animation=''; setStatus('Il ponte non risponde',false); };
  document.body.appendChild(s);
  setTimeout(()=>{ s.remove(); isSyncing=false; $('hdot').style.animation=''; },12000);
}

window.__ptSync = function(payload){
  isSyncing=false;
  $('hdot').style.animation='';
  if(!payload||payload.ok===false){
    setStatus((payload&&payload.error)||'Errore sync',false);
    return;
  }
  lastSyncLabel=new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
  refreshSyncMeta();
  const rows=Array.isArray(payload.rows)?payload.rows:(Array.isArray(payload)?payload:[]);
  mergeRemote(rows);
};

// ── MERGE REMOTO ──────────────────────────
// FIX #1: aggiorna status esistenti (conferme da altri soci) invece di archiviarli
function mergeRemote(items){
  let imported=0, updated=0;
  let restChanged=false;
  const resetTime=app.resetBefore?new Date(app.resetBefore).getTime():null;
  const archivedIds=new Set(app.archivedBridgeIds||[]);

  items.forEach(remote=>{
    const bridgeId=remote.id||remote.bridgeId||remote.created_at;
    const restName=remote.restaurant_name||remote.restaurant||'Sorelle a Mare';
    if(!app.restaurants.includes(restName)){app.restaurants.push(restName);restChanged=true;}
    const remoteTimeRaw=remote.created_at||remote.createdAt||'';
    const remoteTime=remoteTimeRaw?new Date(remoteTimeRaw).getTime():null;
    if(bridgeId&&archivedIds.has(bridgeId)) return;
    if(resetTime&&remoteTime&&remoteTime<=resetTime) return;

    // Se esiste già, aggiorna solo lo stato
    const existingIdx=app.reservations.findIndex(r=>r.bridgeId&&r.bridgeId===bridgeId);
    if(existingIdx!==-1){
      const remoteStatus=remote.status||'Nuova';
      if(app.reservations[existingIdx].status!==remoteStatus){
        app.reservations[existingIdx].status=remoteStatus;
        updated++;
      }
      return;
    }

    // Nuova: aggiungila
    app.reservations.unshift({
      id:Date.now()+imported,bridgeId,
      restaurant:restName,
      bookingType:remote.booking_type||'Prenotazione',
      customerName:remote.customer_name||'',
      phone:remote.phone||'',
      email:remote.email||'',
      guests:Number(remote.guests||0),
      bookingDate:remote.booking_date||'',
      bookingTime:remote.booking_time||'',
      notes:remote.notes||'',
      status:remote.status||'Nuova',
      createdAt:remote.created_at||new Date().toISOString(),
      source:remote.source||'website-form'
    });
    imported++;
  });

  save();
  if(restChanged) fillSelectors();
  renderReservations();

  let msg='';
  if(imported>0&&updated>0) msg=`${imported} nuove, ${updated} aggiornate`;
  else if(imported>0) msg=`${imported} nuove prenotazioni`;
  else if(updated>0) msg=`${updated} aggiornate dai colleghi ✓`;
  else msg='Tutto aggiornato';
  setStatus(msg,true);
  if(imported>0||updated>0) toast(msg,true);
}

// ── BRIDGE CONFIRM ────────────────────────
function startConfirmBridge(item){
  const url=$('bridgeUrl').value.trim();
  const key=$('bridgeKey').value.trim();
  if(!url||!key){ toast('Configura il ponte',false); return; }
  __confirmId=item.id;
  setStatus('Invio conferma…',true,true);
  const s=document.createElement('script');
  s.src=`${url}${url.includes('?')?'&':'?'}action=confirm&key=${encodeURIComponent(key)}&id=${encodeURIComponent(item.bridgeId)}&callback=__ptConfirm&_=${Date.now()}`;
  s.onerror=()=>toast('Ponte non risponde',false);
  document.body.appendChild(s);
  setTimeout(()=>s.remove(),12000);
}

window.__ptConfirm=function(payload){
  const item=app.reservations.find(r=>String(r.id)===String(__confirmId));
  if(!payload||payload.ok===false){
    toast((payload&&payload.error)||'Conferma fallita',false);
    setStatus((payload&&payload.error)||'Conferma fallita',false);
    return;
  }
  if(item){
    // FIX #2: aggiorna status senza rimuovere
    updateStatus(item,'Confermata');
  }
  const msg=payload.emailed?'✓ Confermata – email inviata':'Confermata (email non inviata)';
  toast(msg,payload.emailed);
  setStatus(msg,payload.emailed);
};

// ── AUTO SYNC ─────────────────────────────
function startAutoSync(){
  if(autoTimer) clearInterval(autoTimer);
  refreshSyncMeta();
  if(!$('bridgeUrl').value.trim()||!$('bridgeKey').value.trim()) return;
  setTimeout(()=>syncNow(true),1000);
  autoTimer=setInterval(()=>syncNow(true),AUTO_SYNC_MS);
}

// ── NAVIGATION ────────────────────────────
function switchPage(pageId){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  $(pageId).classList.add('active');
  document.querySelector(`[data-tab="${pageId}"]`).classList.add('active');
}
document.querySelectorAll('.tab').forEach(btn=>{
  btn.onclick=()=>switchPage(btn.dataset.tab);
});

// ── FILTER CHIPS ──────────────────────────
document.querySelectorAll('.f-chip').forEach(chip=>{
  chip.onclick=()=>{
    document.querySelectorAll('.f-chip').forEach(c=>c.classList.remove('active'));
    chip.classList.add('active');
    activeFilter=chip.dataset.filter;
    renderReservations();
  };
});

// ── EXPORT ────────────────────────────────
function exportCsv(){
  const rows=[['Ristorante','Tipo','Cliente','Tel','Email','Data','Ora','Persone','Note','Stato']];
  app.reservations.forEach(r=>rows.push([r.restaurant,r.bookingType,r.customerName,r.phone,r.email,r.bookingDate,r.bookingTime,r.guests,r.notes,r.status]));
  const csv=rows.map(r=>r.map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download='prenotazioni.csv';a.click();
}
function backupJson(){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify(app,null,2)],{type:'application/json'}));
  a.download='pulsetable-backup.json';a.click();
}

// ── BIND ──────────────────────────────────
$('saveBtn').onclick=addReservation;
$('saveBridgeBtn').onclick=saveBridge;
$('syncNowBtn').onclick=()=>syncNow(false);
$('quickSyncBtn').onclick=()=>syncNow(false);
$('exportBtn').onclick=exportCsv;
$('backupBtn').onclick=backupJson;
$('resetBtn').onclick=resetAll;

// ── INIT ──────────────────────────────────
load();
fillSelectors();
refreshSyncMeta();
renderReservations();
startAutoSync();
</script>
</body>
</html>
